<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

html {
	background-color: black;
	color: white;
	font-family: monospace;
}

body{
	padding: 1rem;
}

a{
	font-size: 1rem;
	display: inline-block;
	text-decoration: none;
}

.size{
	display: inline-block;
	margin-right: 0.5rem;
	color: yellow;
}

button:disabled{
	background-color: black;
	color: white;
}

button{
	margin-top: 0.5rem;
}

</style>

<input type="file" id="upload" />
<div>
	<button onclick="uploadFile(this)">upload file</button>
</div>

<script>
const aTags = document.querySelectorAll("a");
const DIR_NAME = window.location.pathname.split("/").pop();

async function deleteFile(name) {
	const response = await fetch(`/delete/${DIR_NAME}/${name}`, {
		method: "DELETE",
	});

	const data = await response.text();

	if(data === "success") {
		alert("deleted successfully!");
	} else {
		alert(`error: ${data}`);
	}
	window.location.reload();
}

for(const a of aTags) {
	let parent = a.parentElement;
	let deleteBtn = document.createElement("button");
	let [actualName, name] = a.innerText.split(";");
	let origin = window.location.origin;

	deleteBtn.style.marginLeft = "1rem";
	deleteBtn.innerText = "delete";
	deleteBtn.addEventListener("click", () => {
		deleteBtn.disabled = true;
		deleteFile(actualName);
	});
	parent.appendChild(deleteBtn);

	a.href = `${origin}/fs/${DIR_NAME}/${actualName}`;
	a.innerText = name;
	a.style.color = "#fff";
}

async function uploadFile(btn) {
	try {
		btn.disabled = true;
		btn.innerText = "Initializing...";

		const fileInput = document.getElementById("upload");
		const file = fileInput.files[0];
		if (!file) return;

		const CHUNK_SIZE = 16 * 1024;
		const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

		const parts = file.name.split('.');
		const name = encodeURIComponent(file.name);
		const size = encodeURIComponent(file.size);
		let ext = "bin";

		if(parts.length > 1) {
			ext = parts.pop();
		}

		const initResponse = await fetch(`/upload-new/${DIR_NAME}?name=${name}&size=${size}&ext=${ext}`, {
			method: "POST",
			headers: { "Content-Type": "application/json" }
		});
		let data = (await initResponse.text()).trim();
		if (!initResponse.ok) {
			throw new Error(data);
		}

		let serverFileName = data.slice(1, -1);
		let prefix = "success: ";
		
		if(serverFileName.startsWith(prefix)) {
			serverFileName = serverFileName.slice(prefix.length);
		} else {
			alert(data);
			throw new Error(data);
		}

		for (let i = 0; i < totalChunks; i++) {
			for(let j = 0; j < 5; j++) {
				const start = i * CHUNK_SIZE;
				const end = Math.min(start + CHUNK_SIZE, file.size);
				const chunk = file.slice(start, end);

				btn.innerText = `Uploading chunk ${i + 1}/${totalChunks}`;

				let text;
				try {
					const id = encodeURIComponent(serverFileName);
					const chunkResponse = await fetch(`/upload-chunk/${DIR_NAME}?id=${id}&idx=${i}`, {
						method: "POST",
						body: chunk,
					});

					if (!chunkResponse.ok) {
						continue;
					}
					text = (await chunkResponse.text()).trim();
				} catch {
					continue;
				}

				text = text.slice(1, -1);

				if(Number(text) !== chunk.size) {
					throw new Error(`Length doesn't match: expected "${chunk.size}" found "${text.trim()}"`)
				}

				break;
			}
		}

		btn.innerText = "Finalizing...";
		const id = encodeURIComponent(serverFileName);
		const endResponse = await fetch(`/upload-end/${DIR_NAME}?id=${id}`, {
			method: "POST",
			headers: { "Connection": "close" }
		});
		const resData = await endResponse.text();
		alert(resData);
	} catch (e) {
		console.error(e);
		alert(`Error: ${e.message}`);
	}

	window.location.reload();
}

</script>
