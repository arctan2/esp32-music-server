<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head><title>jinchak music</title></head>

<style>
*, *::before, *::after {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	-webkit-tap-highlight-color: transparent;
}

:root{
	--orange: rgb(212, 122, 38);
	--pink: rgb(255, 0, 183);
	--green: rgb(0, 255, 0);
}

body{
	display: flex;
	justify-content: center;
	align-items: center;
	width: 100dvw;
	height: 100dvh;
	background-color: rgb(20, 20, 20);
	font-family: monospace;
	color: white;
}

#music-list{
	display: flex;
	flex-direction: column;
	padding: 1rem;
	gap: 0.75rem;
	width: 50%;
	height: 90%;
	background-color: rgba(0, 0, 0, 0.2);
	overflow: auto;
}

.music{
	display: flex;
	flex-direction: row;
	gap: 1rem;
	height: 5.5rem;
	background-color: rgb(25, 25, 25);
	cursor: pointer;
}

.music-details {
	display: flex;
	flex-direction: column;
	margin: 0.25rem 0;
}

.music-details h2 {
	font-size: 1rem;
	margin-bottom: 0.75rem;
	color: var(--green);
	overflow: hidden;
	line-clamp: 2;
}

.icon{
	display: flex;
	flex-direction: row;
	justify-content: center;
	align-items: center;
	min-width: 3.75rem;
	min-height: 100%;
	background-color: rgb(40, 40, 40);
	cursor: pointer;
}

.music:hover .icon{
	background-color: white;
}

.music:hover .play-icon{
	border-left: calc(var(--size) * 2) solid black;
}

.play-icon {
	--size: 0.75rem;
	width: 0;
	height: 0;
	border-top: var(--size) solid transparent;
	border-bottom: var(--size) solid transparent;
	border-left: calc(var(--size) * 2) solid var(--pink);
	margin: var(--size);
}

.scroll-bar::-webkit-scrollbar{
	width: 8px;
	height: 8px;
}

.scroll-bar::-webkit-scrollbar-thumb{
	background-color: rgb(171, 186, 176);
}

@media (max-width: 500px) {
#music-list{
	width: 100%;
	height: 100%;
}
}

</style>

<body>
	<div id="music-list" class="scroll-bar">
	</div>
</body>

<script>

const musicListEl = document.getElementById("music-list");

function renderMusicList(musicList) {
	for(const music of musicList) {
		musicListEl.innerHTML += `
		<div class="music">
			<div class="icon">
				<div class="play-icon"></div>
			</div>
			<div class="music-details">
				<h2>${music.name}</h2>
				<div>${music.id}</div>
				<div>${music.size} B</div>
			</div>
		</div>`;
	}
}

function parseList(doc) {
	const listEl = doc.getElementById("list");

	let musicList = [];

	for(let child of listEl.children) {
		if(child.tagName !== 'DIV') continue;

		const size = parseInt(child.children[0].innerText);
		const [id, name] = child.children[1].innerText.split(";");

		musicList.push({ size, id, name });
	}

	return musicList;
}

async function fetchMusicList() {
	const res = await fetch("http://192.168.0.107:8000/list/music");
	const data = await res.text();
	const doc = document.implementation.createHTMLDocument("music_list");
	doc.body.innerHTML = data;

	const musicList = parseList(doc);

	renderMusicList(musicList);
}

fetchMusicList();
</script>

</html>
